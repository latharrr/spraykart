name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Minimal env vars required to satisfy boot-time validation (auth.js, instrumentation.js).
      # No real secrets — these are CI placeholders only.
      NODE_ENV: production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-placeholder-secret-key-at-least-32-chars-long
      CRON_SECRET: ci-placeholder-cron-secret-32-chars-long
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_BUSINESS_NAME: Spraykart
      NEXT_PUBLIC_FREE_SHIPPING_THRESHOLD: '999'
      NEXT_PUBLIC_STANDARD_SHIPPING_FEE: '49'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/
          retention-days: 3
